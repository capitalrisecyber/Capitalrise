<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta http-equiv="X-UA-Compatible" content="IE=edge">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CapitalRise | Wallet</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:'Poppins',sans-serif;

}

body{

background:#070707;

color:#fff;

overflow-x:hidden;

min-height:100vh;

position:relative;

padding-bottom:100px;

}

body::before{

content:"";

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:url("assets/images/banner2.jpg") center center/cover no-repeat;

opacity:.08;

filter:blur(5px);

z-index:-2;

}

body::after{

content:"";

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:linear-gradient(to bottom,#000000dd,#0b0b0b,#000);

z-index:-1;

}

.header{

padding:22px 18px;

display:flex;

justify-content:space-between;

align-items:center;

}

.back{

width:45px;

height:45px;

border-radius:12px;

background:#151515;

display:flex;

justify-content:center;

align-items:center;

font-size:22px;

cursor:pointer;

border:1px solid rgba(255,255,255,.08);

}

.title-box h1{

font-size:26px;

color:#FFD54F;

font-weight:700;

}

.title-box p{

margin-top:4px;

font-size:13px;

color:#999;

}

.wallet-card{

width:92%;

margin:auto;

background:linear-gradient(135deg,#FFD54F,#FFC107);

border-radius:22px;

padding:25px;

color:#111;

box-shadow:0 12px 30px rgba(255,193,7,.25);

}

.wallet-card h2{

font-size:17px;

font-weight:700;

}

.balance{

font-size:38px;

font-weight:800;

margin-top:12px;

}

.wallet-info{

margin-top:10px;

font-size:13px;

opacity:.8;

}

.action-grid{

width:92%;

margin:22px auto;

display:grid;

grid-template-columns:1fr 1fr;

gap:15px;

}

.action-card{

background:#111;

border:1px solid rgba(255,255,255,.08);

border-radius:18px;

padding:18px;

text-align:center;

transition:.3s;

cursor:pointer;

}

.action-card:hover{

transform:translateY(-4px);

border-color:#FFD54F;

}

.action-card img{

width:40px;

height:40px;

margin-bottom:10px;

}

.action-card h3{

font-size:16px;

margin-bottom:5px;

}

.action-card p{

font-size:12px;

color:#999;

line-height:18px;

}
  .transaction-title{

width:92%;

margin:25px auto 15px;

font-size:18px;

font-weight:700;

color:#FFD54F;

}

.transaction-list{

width:92%;

margin:auto;

display:flex;

flex-direction:column;

gap:15px;

}

.transaction-card{

background:#111;

border:1px solid rgba(255,255,255,.08);

border-radius:18px;

padding:16px;

display:flex;

justify-content:space-between;

align-items:center;

transition:.3s;

}

.transaction-card:hover{

border-color:#FFD54F;

}

.transaction-left{

display:flex;

align-items:center;

gap:14px;

}

.transaction-icon{

width:50px;

height:50px;

border-radius:14px;

background:#1b1b1b;

display:flex;

justify-content:center;

align-items:center;

}

.transaction-icon img{

width:28px;

height:28px;

}

.transaction-info h3{

font-size:16px;

margin-bottom:4px;

}

.transaction-info p{

font-size:12px;

color:#999;

}

.transaction-amount{

font-size:18px;

font-weight:700;

color:#00E676;

}

.empty{

width:92%;

margin:30px auto;

text-align:center;

display:none;

}

.empty img{

width:150px;

margin-bottom:15px;

}

.empty h3{

font-size:20px;

margin-bottom:8px;

}

.empty p{

font-size:13px;

color:#999;

line-height:22px;

}

.bottom-space{

height:30px;

}
  @keyframes fadeUp{

0%{

opacity:0;

transform:translateY(30px);

}

100%{

opacity:1;

transform:translateY(0);

}

}

@media(max-width:480px){

.header{

padding:18px 15px;

}

.wallet-card{

padding:20px;

}

.balance{

font-size:30px;

}

.action-grid{

grid-template-columns:1fr 1fr;

gap:12px;

}

.action-card{

padding:15px;

}

.action-card img{

width:34px;

height:34px;

}

.transaction-card{

padding:14px;

}

.transaction-icon{

width:45px;

height:45px;

}

.transaction-icon img{

width:24px;

height:24px;

}

}

</style>

</head>

<body>

<div class="header">

<div

class="back"

onclick="history.back()">

←

</div>

<div class="title-box">

<h1>

Wallet

</h1>

<p>

Manage your rewards

</p>

</div>

</div>

<div class="wallet-card">

<h2>

Available Balance

</h2>

<div

class="balance"

id="walletBalance">

0 Coins

</div>

<div class="wallet-info">

Last updated from your CapitalRise account.

</div>

</div>

<div class="action-grid">

<div

class="action-card"

onclick="location.href='redeem.html'">

<img src="assets/icons/wallet.svg">

<h3>

Redeem

</h3>

<p>

Convert coins into rewards.

</p>

</div>

<div

class="action-card"

onclick="location.href='history.html'">

<img src="assets/icons/gift.svg">

<h3>

History

</h3>

<p>

View all transactions.

</p>

</div>

</div>

<h2 class="transaction-title">

Recent Transactions

</h2>

<div

class="transaction-list"

id="transactionList">

</div>

<div

class="empty"

id="emptyBox">

<img src="assets/images/empty.png">

<h3>

No Transactions

</h3>

<p>

Complete tasks to earn your first reward.

</p>

</div>

<div class="bottom-space"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="js/firebase.js"></script>

<script src="js/wallet.js"></script>

</body>

</html>
