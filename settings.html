<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta http-equiv="X-UA-Compatible" content="IE=edge">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CapitalRise | Settings</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:'Poppins',sans-serif;

}

body{

background:#070707;

color:#fff;

overflow-x:hidden;

min-height:100vh;

position:relative;

padding-bottom:100px;

}

body::before{

content:"";

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:url("assets/images/banner2.jpg") center center/cover no-repeat;

opacity:.08;

filter:blur(5px);

z-index:-2;

}

body::after{

content:"";

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:linear-gradient(to bottom,#000000dd,#0b0b0b,#000);

z-index:-1;

}

.header{

padding:22px 18px;

display:flex;

justify-content:space-between;

align-items:center;

}

.back{

width:45px;

height:45px;

border-radius:12px;

background:#151515;

display:flex;

justify-content:center;

align-items:center;

font-size:22px;

cursor:pointer;

border:1px solid rgba(255,255,255,.08);

}

.title-box h1{

font-size:26px;

font-weight:700;

color:#FFD54F;

}

.title-box p{

margin-top:4px;

font-size:13px;

color:#999;

}

.settings-card{

width:92%;

margin:20px auto;

background:rgba(255,255,255,.05);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.08);

border-radius:22px;

padding:22px;

animation:fadeUp .7s ease;

}

.settings-title{

font-size:20px;

font-weight:700;

color:#FFD54F;

margin-bottom:18px;

}

.settings-list{

display:flex;

flex-direction:column;

gap:15px;

}
  .setting-item{

background:#111;

border:1px solid rgba(255,255,255,.08);

border-radius:18px;

padding:18px;

display:flex;

justify-content:space-between;

align-items:center;

cursor:pointer;

transition:.3s;

}

.setting-item:hover{

border-color:#FFD54F;

transform:translateY(-3px);

}

.setting-left{

display:flex;

align-items:center;

gap:15px;

}

.setting-icon{

width:52px;

height:52px;

border-radius:15px;

background:#1b1b1b;

display:flex;

justify-content:center;

align-items:center;

}

.setting-icon img{

width:28px;

height:28px;

object-fit:contain;

}

.setting-info h3{

font-size:16px;

font-weight:700;

margin-bottom:5px;

}

.setting-info p{

font-size:12px;

color:#999;

line-height:18px;

}

.setting-arrow{

font-size:24px;

color:#FFD54F;

}

.logout-btn{

width:92%;

height:58px;

margin:25px auto;

display:block;

border:none;

border-radius:16px;

background:linear-gradient(90deg,#ff4d4d,#ff1a1a);

color:#fff;

font-size:18px;

font-weight:700;

cursor:pointer;

transition:.3s;

}

.logout-btn:hover{

transform:translateY(-2px);

box-shadow:0 10px 25px rgba(255,0,0,.30);

}

.version{

text-align:center;

margin-top:15px;

font-size:13px;

color:#777;

}
  .bottom-space{

height:30px;

}

@keyframes fadeUp{

0%{

opacity:0;

transform:translateY(30px);

}

100%{

opacity:1;

transform:translateY(0);

}

}

@media(max-width:480px){

.header{

padding:18px 15px;

}

.settings-card{

padding:18px;

}

.setting-item{

padding:15px;

}

.setting-icon{

width:46px;

height:46px;

}

.setting-icon img{

width:24px;

height:24px;

}

.setting-info h3{

font-size:15px;

}

.setting-info p{

font-size:11px;

}

.logout-btn{

height:52px;

font-size:16px;

}

}

</style>

</head>

<body>

<div class="header">

<div

class="back"

onclick="history.back()">

←

</div>

<div class="title-box">

<h1>

Settings

</h1>

<p>

Manage your preferences

</p>

</div>

</div>

<div class="settings-card">

<h2 class="settings-title">

General Settings

</h2>

<div class="settings-list">

</div>

</div>

<button

class="logout-btn"

id="logoutBtn">

Logout

</button>

<div class="version">

CapitalRise v1.0.0

</div>

<div class="bottom-space"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script src="js/firebase.js"></script>

<script src="js/settings.js"></script>

</body>

</html>
