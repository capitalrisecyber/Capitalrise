<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta http-equiv="X-UA-Compatible" content="IE=edge">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CapitalRise | Daily Tasks</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:'Poppins',sans-serif;

}

body{

background:#070707;

color:#fff;

overflow-x:hidden;

min-height:100vh;

position:relative;

padding-bottom:100px;

}

body::before{

content:"";

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:url("assets/images/banner1.jpg") center center/cover no-repeat;

opacity:.07;

filter:blur(5px);

z-index:-2;

}

body::after{

content:"";

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:linear-gradient(to bottom,#000000dd,#0b0b0b,#000);

z-index:-1;

}

.header{

padding:22px 18px;

display:flex;

justify-content:space-between;

align-items:center;

}

.back{

width:45px;

height:45px;

border-radius:12px;

background:#151515;

display:flex;

justify-content:center;

align-items:center;

font-size:22px;

cursor:pointer;

border:1px solid rgba(255,255,255,.08);

}

.title-box h1{

font-size:26px;

color:#FFD54F;

font-weight:700;

}

.title-box p{

margin-top:4px;

font-size:13px;

color:#999;

}

.reward-card{

width:92%;

margin:auto;

background:linear-gradient(135deg,#FFD54F,#FFC107);

border-radius:22px;

padding:22px;

color:#111;

box-shadow:0 10px 30px rgba(255,193,7,.25);

}

.reward-card h2{

font-size:18px;

font-weight:700;

}

.reward-card h3{

font-size:34px;

margin-top:8px;

font-weight:800;

}

.progress-title{

width:92%;

margin:22px auto 10px;

display:flex;

justify-content:space-between;

font-size:14px;

}

.progress{

width:92%;

height:12px;

background:#1b1b1b;

margin:auto;

border-radius:20px;

overflow:hidden;

}

.progress span{

display:block;

width:0%;

height:100%;

background:#FFD54F;

border-radius:20px;

transition:.4s;

}

.tasks{

width:92%;

margin:25px auto;

display:flex;

flex-direction:column;

gap:18px;

}
  .task-card{

background:#111;

border:1px solid rgba(255,255,255,.08);

border-radius:18px;

padding:18px;

display:flex;

align-items:center;

justify-content:space-between;

transition:.3s;

}

.task-card:hover{

border-color:#FFD54F;

transform:translateY(-3px);

}

.task-left{

display:flex;

align-items:center;

gap:15px;

}

.task-icon{

width:60px;

height:60px;

border-radius:16px;

background:#1b1b1b;

display:flex;

justify-content:center;

align-items:center;

}

.task-icon img{

width:34px;

height:34px;

object-fit:contain;

}

.task-info h3{

font-size:17px;

font-weight:700;

color:#fff;

margin-bottom:6px;

}

.task-info p{

font-size:13px;

color:#999;

line-height:20px;

}

.reward{

margin-top:8px;

display:inline-block;

padding:5px 12px;

border-radius:30px;

background:rgba(255,213,79,.12);

color:#FFD54F;

font-size:12px;

font-weight:700;

}

.claim-btn{

min-width:105px;

height:45px;

border:none;

border-radius:12px;

background:linear-gradient(90deg,#FFD54F,#FFC107);

color:#111;

font-size:15px;

font-weight:700;

cursor:pointer;

transition:.3s;

}

.claim-btn:hover{

transform:scale(1.05);

}

.claim-btn:disabled{

background:#444;

color:#aaa;

cursor:not-allowed;

transform:none;

}

.completed{

background:#1d3b23 !important;

color:#7CFC98 !important;

}

.bottom-space{

height:25px;

}
  @keyframes fadeUp{

0%{

opacity:0;

transform:translateY(30px);

}

100%{

opacity:1;

transform:translateY(0);

}

}

@media(max-width:480px){

.header{

padding:18px 15px;

}

.reward-card{

padding:18px;

}

.reward-card h3{

font-size:28px;

}

.task-card{

padding:15px;

}

.task-icon{

width:52px;

height:52px;

}

.task-icon img{

width:28px;

height:28px;

}

.task-info h3{

font-size:15px;

}

.task-info p{

font-size:12px;

}

.claim-btn{

min-width:90px;

height:42px;

font-size:14px;

}

}

</style>

</head>

<body>

<div class="header">

<div class="back"

onclick="history.back()">

←

</div>

<div class="title-box">

<h1>

Daily Tasks

</h1>

<p>

Complete tasks & earn coins

</p>

</div>

</div>

<div class="reward-card">

<h2>

Today's Earnings

</h2>

<h3 id="todayCoins">

0 Coins

</h3>

</div>

<div class="progress-title">

<span>

Today's Progress

</span>

<span id="progressText">

0 / 20

</span>

</div>

<div class="progress">

<span id="progressBar"></span>

</div>

<div

class="tasks"

id="taskContainer">

</div>

<div class="bottom-space"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="js/firebase.js"></script>

<script src="js/tasks.js"></script>

</body>

</html>
