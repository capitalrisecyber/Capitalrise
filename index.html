<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CapitalRise</title>

<link rel="stylesheet" href="css/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#050505,#111,#1b1b1b);
overflow:hidden;
}

.bg{
position:absolute;
width:100%;
height:100%;
background:url("assets/images/banner1.jpg") center/cover no-repeat;
opacity:.12;
filter:blur(2px);
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(to top,#000,#00000090,#000);
}

.container{
position:relative;
z-index:5;
text-align:center;
padding:25px;
}

.logo{
width:130px;
height:130px;
object-fit:contain;
animation:pop 1s ease;
}

h1{
color:#FFD54F;
font-size:34px;
margin-top:18px;
font-weight:700;
letter-spacing:1px;
}

p{
color:#ddd;
margin-top:10px;
font-size:15px;
}

.loader{
margin:35px auto 0;
width:55px;
height:55px;
border:5px solid #333;
border-top:5px solid #FFD54F;
border-radius:50%;
animation:spin 1s linear infinite;
}

.version{
position:absolute;
bottom:20px;
width:100%;
text-align:center;
color:#777;
font-size:13px;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

@keyframes pop{

0%{
transform:scale(.5);
opacity:0;
}

100%{
transform:scale(1);
opacity:1;
}

}

</style>

</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="container">

<img src="assets/logo/logo.png" class="logo">

<h1>CapitalRise</h1>

<p>Grow Smarter. Rise Higher.</p>

<div class="loader"></div>

</div>

<div class="version">
Version 1.0
</div>

<script>

setTimeout(()=>{

if(localStorage.getItem("capitalrise_user")){

window.location.href="dashboard.html";

}else{

window.location.href="login.html";

}

},3000);

</script>

</body>
</html>
