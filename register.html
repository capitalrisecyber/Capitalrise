<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta http-equiv="X-UA-Compatible" content="IE=edge">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CapitalRise | Register</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:'Poppins',sans-serif;

}

body{

background:#070707;

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:30px 15px;

overflow-x:hidden;

position:relative;

}

body::before{

content:"";

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:url("assets/images/banner2.jpg") center center/cover no-repeat;

opacity:.08;

filter:blur(5px);

z-index:-2;

}

body::after{

content:"";

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:linear-gradient(to bottom,#000000dd,#0b0b0b,#000);

z-index:-1;

}

.register-card{

width:100%;

max-width:430px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.08);

border-radius:28px;

padding:35px 25px;

box-shadow:0 20px 45px rgba(0,0,0,.55);

animation:fadeUp .8s ease;

}

.logo{

width:95px;

height:95px;

display:block;

margin:auto;

object-fit:contain;

}

.title{

margin-top:18px;

text-align:center;

font-size:32px;

font-weight:700;

color:#FFD54F;

}

.subtitle{

margin-top:10px;

text-align:center;

font-size:14px;

line-height:22px;

color:#cfcfcf;

}

.avatar{

margin:28px auto;

width:110px;

height:110px;

border-radius:50%;

overflow:hidden;

border:3px solid #FFD54F;

display:flex;

justify-content:center;

align-items:center;

background:#111;

box-shadow:0 0 18px rgba(255,213,79,.25);

}

.avatar img{

width:100%;

height:100%;

object-fit:cover;

}

#photo{

display:none;

}

.upload-btn{

width:100%;

height:50px;

border:none;

border-radius:14px;

margin-top:15px;

background:#FFD54F;

font-size:16px;

font-weight:700;

cursor:pointer;

color:#111;

}

.form{

margin-top:28px;

}

.label{

display:block;

margin-bottom:8px;

font-size:14px;

font-weight:600;

color:#FFD54F;

}

.input-box{

width:100%;

height:58px;

background:#121212;

border:1px solid rgba(255,213,79,.25);

border-radius:15px;

padding:0 18px;

margin-bottom:18px;

}

.input{

width:100%;

height:100%;

background:none;

border:none;

outline:none;

font-size:16px;

color:#fff;

}

.input::placeholder{

color:#888;

}
  .referral-note{

font-size:12px;

color:#999;

line-height:20px;

margin-bottom:20px;

}

.send-btn{

width:100%;

height:58px;

border:none;

border-radius:16px;

background:linear-gradient(90deg,#FFD54F,#FFC107);

color:#111;

font-size:18px;

font-weight:700;

cursor:pointer;

transition:.3s;

margin-top:5px;

}

.send-btn:hover{

transform:translateY(-2px);

box-shadow:0 10px 25px rgba(255,193,7,.30);

}

.otp-section{

display:none;

margin-top:25px;

animation:fadeUp .5s ease;

}

.otp-title{

color:#FFD54F;

font-size:15px;

font-weight:600;

margin-bottom:12px;

}

.otp-box{

display:flex;

justify-content:space-between;

gap:10px;

}

.otp-input{

width:50px;

height:55px;

background:#111;

border:1px solid rgba(255,255,255,.12);

border-radius:12px;

text-align:center;

font-size:22px;

font-weight:700;

color:#fff;

outline:none;

transition:.3s;

}

.otp-input:focus{

border-color:#FFD54F;

box-shadow:0 0 12px rgba(255,213,79,.30);

}

.register-btn{

width:100%;

height:58px;

border:none;

border-radius:16px;

margin-top:22px;

background:linear-gradient(90deg,#00E676,#00C853);

color:#111;

font-size:18px;

font-weight:700;

cursor:pointer;

display:none;

}

.register-btn:hover{

transform:translateY(-2px);

}

.info{

margin-top:18px;

font-size:12px;

line-height:20px;

color:#999;

}

.footer{

margin-top:28px;

text-align:center;

font-size:12px;

color:#777;

}

.footer a{

color:#FFD54F;

text-decoration:none;

}

@keyframes fadeUp{

0%{

opacity:0;

transform:translateY(40px);

}

100%{

opacity:1;

transform:translateY(0);

}

}

@media(max-width:480px){

.register-card{

padding:30px 20px;

}

.title{

font-size:28px;

}

.avatar{

width:95px;

height:95px;

}

.otp-input{

width:45px;

height:50px;

font-size:20px;

}

}

</style>

</head>

<body>

<div class="register-card">

<img
src="assets/logo/logo.png"
class="logo">

<h1 class="title">

Create Account

</h1>

<p class="subtitle">

Join CapitalRise and start earning today.

</p>

<div class="avatar">

<img

id="avatarPreview"

src="assets/images/avatar.png">

</div>

<input

type="file"

id="photo"

accept="image/*">

<button

class="upload-btn"

id="choosePhoto">

Choose Photo

</button>

<div class="form">

<label class="label">

Full Name

</label>

<div class="input-box">

<input

type="text"

id="name"

class="input"

placeholder="Enter Full Name">

</div>

<label class="label">

Gmail

</label>

<div class="input-box">

<input

type="email"

id="email"

class="input"

placeholder="Enter Gmail Address">

</div>
<label class="label">

Mobile Number

</label>

<div class="input-box">

<input

type="tel"

id="phone"

class="input"

placeholder="Enter Mobile Number"

maxlength="10">

</div>

<label class="label">

Referral Code (Optional)

</label>

<div class="input-box">

<input

type="text"

id="referral"

class="input"

placeholder="Enter Referral Code">

</div>

<p class="referral-note">

Referral code is optional. If you have one, enter it to receive bonus rewards.

</p>

<div id="recaptcha-container"></div>

<button

class="send-btn"

id="sendOtp">

Send OTP

</button>

<div

class="otp-section"

id="otpSection">

<div class="otp-title">

Enter 6 Digit OTP

</div>

<div class="otp-box">

<input class="otp-input" maxlength="1">

<input class="otp-input" maxlength="1">

<input class="otp-input" maxlength="1">

<input class="otp-input" maxlength="1">

<input class="otp-input" maxlength="1">

<input class="otp-input" maxlength="1">

</div>

<button

class="register-btn"

id="registerBtn">

Verify OTP & Register

</button>

<p class="info">

After successful verification your CapitalRise account will be created automatically.

</p>

</div>

<div class="footer">

Already have an account?

<a href="login.html">

Login

</a>

</div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="js/firebase.js"></script>

<script>
  const auth = firebase.auth();

const db = firebase.firestore();

let confirmationResult = null;

const choosePhoto = document.getElementById("choosePhoto");

const photo = document.getElementById("photo");

const avatarPreview = document.getElementById("avatarPreview");

const sendOtp = document.getElementById("sendOtp");

const registerBtn = document.getElementById("registerBtn");

const otpSection = document.getElementById("otpSection");

const otpInputs = document.querySelectorAll(".otp-input");

choosePhoto.addEventListener("click",function(){

photo.click();

});

photo.addEventListener("change",function(){

const file=this.files[0];

if(!file){

return;

}

const reader=new FileReader();

reader.onload=function(e){

avatarPreview.src=e.target.result;

localStorage.setItem(

"capitalrise_avatar",

e.target.result

);

};

reader.readAsDataURL(file);

});

window.onload=function(){

window.recaptchaVerifier=

new firebase.auth.RecaptchaVerifier(

"recaptcha-container",

{

size:"normal"

}

);

recaptchaVerifier.render();

};

sendOtp.addEventListener("click",function(){

const phone=document.getElementById("phone").value.trim();

if(phone.length!==10){

alert("Please Enter Valid Mobile Number");

return;

}

sendOtp.disabled=true;

sendOtp.innerHTML="Sending OTP...";

auth.signInWithPhoneNumber(

"+91"+phone,

window.recaptchaVerifier

)

.then(function(result){

confirmationResult=result;

otpSection.style.display="block";

registerBtn.style.display="block";

sendOtp.style.display="none";

})

.catch(function(error){

alert(error.message);

sendOtp.disabled=false;

sendOtp.innerHTML="Send OTP";

});

});

otpInputs.forEach((input,index)=>{

input.addEventListener("input",function(){

if(this.value.length===1 && index<otpInputs.length-1){

otpInputs[index+1].focus();

}

});

});
  registerBtn.addEventListener("click",async function(){

let otp="";

otpInputs.forEach(function(input){

otp+=input.value;

});

if(otp.length!==6){

alert("Please Enter Valid OTP");

return;

}

registerBtn.disabled=true;

registerBtn.innerHTML="Creating Account...";

try{

const result=await confirmationResult.confirm(otp);

const user=result.user;

const name=document.getElementById("name").value.trim();

const email=document.getElementById("email").value.trim();

const phone=document.getElementById("phone").value.trim();

const referral=document.getElementById("referral").value.trim();

const avatar=

localStorage.getItem("capitalrise_avatar")

||

"assets/images/avatar.png";

await db.collection("users")

.doc(user.uid)

.set({

uid:user.uid,

name:name,

email:email,

phone:"+91"+phone,

referralCode:referral,

profileImage:avatar,

wallet:0,

coins:0,

todayCoins:0,

completedTasks:0,

totalTasks:0,

referrals:0,

level:"Beginner",

joined:firebase.firestore.FieldValue.serverTimestamp()

});

localStorage.setItem(

"capitalrise_uid",

user.uid

);

localStorage.setItem(

"capitalrise_name",

name

);

localStorage.setItem(

"capitalrise_phone",

"+91"+phone

);

localStorage.setItem(

"capitalrise_email",

email

);

window.location.href="dashboard.html";

}

catch(error){

alert(error.message);

registerBtn.disabled=false;

registerBtn.innerHTML="Verify OTP & Register";

}

});

document.addEventListener("keydown",function(e){

if(e.key==="Enter"){

if(otpSection.style.display==="none"){

sendOtp.click();

}else{

registerBtn.click();

}

}

});

</script>

</body>

</html>
