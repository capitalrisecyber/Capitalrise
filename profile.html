<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta http-equiv="X-UA-Compatible" content="IE=edge">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CapitalRise | Profile</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:'Poppins',sans-serif;

}

body{

background:#070707;

color:#fff;

overflow-x:hidden;

min-height:100vh;

position:relative;

padding-bottom:100px;

}

body::before{

content:"";

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:url("assets/images/banner2.jpg") center center/cover no-repeat;

opacity:.08;

filter:blur(5px);

z-index:-2;

}

body::after{

content:"";

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:linear-gradient(to bottom,#000000dd,#0b0b0b,#000);

z-index:-1;

}

.header{

padding:22px 18px;

display:flex;

justify-content:space-between;

align-items:center;

}

.back{

width:45px;

height:45px;

border-radius:12px;

background:#151515;

display:flex;

justify-content:center;

align-items:center;

font-size:22px;

cursor:pointer;

border:1px solid rgba(255,255,255,.08);

}

.title-box h1{

font-size:26px;

font-weight:700;

color:#FFD54F;

}

.title-box p{

margin-top:4px;

font-size:13px;

color:#999;

}

.profile-card{

width:92%;

margin:auto;

background:rgba(255,255,255,.05);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.08);

border-radius:22px;

padding:25px;

text-align:center;

animation:fadeUp .7s ease;

}

.profile-image{

width:110px;

height:110px;

border-radius:50%;

border:3px solid #FFD54F;

object-fit:cover;

background:#111;

margin:auto;

display:block;

}

.edit-photo{

margin-top:15px;

display:inline-block;

padding:10px 18px;

border-radius:12px;

background:#FFD54F;

color:#111;

font-size:14px;

font-weight:700;

cursor:pointer;

}

#profilePhoto{

display:none;

}

.profile-name{

margin-top:18px;

font-size:24px;

font-weight:700;

color:#FFD54F;

}

.profile-id{

margin-top:6px;

font-size:13px;

color:#999;

}

.info-list{

width:92%;

margin:25px auto;

display:flex;

flex-direction:column;

gap:16px;

}
  .profile-item{

background:#111;

border:1px solid rgba(255,255,255,.08);

border-radius:18px;

padding:18px;

display:flex;

justify-content:space-between;

align-items:center;

transition:.3s;

}

.profile-item:hover{

border-color:#FFD54F;

transform:translateY(-3px);

}

.profile-left{

display:flex;

align-items:center;

gap:15px;

}

.profile-icon{

width:52px;

height:52px;

border-radius:15px;

background:#1b1b1b;

display:flex;

justify-content:center;

align-items:center;

}

.profile-icon img{

width:28px;

height:28px;

}

.profile-details h3{

font-size:16px;

font-weight:700;

margin-bottom:5px;

}

.profile-details p{

font-size:13px;

color:#999;

word-break:break-word;

}

.edit-btn{

padding:10px 18px;

border:none;

border-radius:12px;

background:linear-gradient(90deg,#FFD54F,#FFC107);

color:#111;

font-size:14px;

font-weight:700;

cursor:pointer;

transition:.3s;

}

.edit-btn:hover{

transform:scale(1.05);

}

.stats{

width:92%;

margin:25px auto;

display:grid;

grid-template-columns:repeat(3,1fr);

gap:15px;

}

.stat-card{

background:#111;

border:1px solid rgba(255,255,255,.08);

border-radius:18px;

padding:18px;

text-align:center;

}

.stat-card h2{

font-size:24px;

font-weight:700;

color:#FFD54F;

margin-bottom:6px;

}

.stat-card p{

font-size:12px;

color:#999;

}
  .bottom-space{

height:30px;

}

@keyframes fadeUp{

0%{

opacity:0;

transform:translateY(30px);

}

100%{

opacity:1;

transform:translateY(0);

}

}

@media(max-width:480px){

.header{

padding:18px 15px;

}

.profile-card{

padding:20px;

}

.profile-image{

width:95px;

height:95px;

}

.profile-name{

font-size:21px;

}

.stats{

grid-template-columns:1fr;

}

.profile-item{

padding:15px;

}

.profile-icon{

width:46px;

height:46px;

}

.profile-icon img{

width:24px;

height:24px;

}

}

</style>

</head>

<body>

<div class="header">

<div

class="back"

onclick="history.back()">

←

</div>

<div class="title-box">

<h1>

Profile

</h1>

<p>

Manage your CapitalRise account

</p>

</div>

</div>

<div class="profile-card">

<img

id="profileImage"

class="profile-image"

src="assets/images/avatar.png">

<input

type="file"

id="profilePhoto"

accept="image/*">

<label

for="profilePhoto"

class="edit-photo">

Change Photo

</label>

<h2

class="profile-name"

id="userName">

Loading...

</h2>

<p

class="profile-id"

id="userUid">

UID: Loading...

</p>

</div>

<div class="stats">

<div class="stat-card">

<h2 id="walletCoins">

0

</h2>

<p>

Wallet Coins

</p>

</div>

<div class="stat-card">

<h2 id="completedTasks">

0

</h2>

<p>

Completed Tasks

</p>

</div>

<div class="stat-card">

<h2 id="totalReferrals">

0

</h2>

<p>

Referrals

</p>

</div>

</div>

<div class="info-list" id="profileInfo">

</div>

<div class="bottom-space"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="js/firebase.js"></script>

<script src="js/profile.js"></script>

</body>

</html>
